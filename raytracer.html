<html>
<head>
<meta charset=utf-8 />
<title></title>
<link rel="stylesheet" type="text/css" media="screen" href="css/raytracer.css" />
<!--[if IE]>
<script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
<![endif]-->
<script src="js/raytracer.js"></script>
</head>
<body onload="run()">
 <script>
 
   function run() {
     var rt = new RayTracer('screen');
	 
	 var last = null;
	 var interval = 50;
	 
	 (function update(timestamp) {	
	   if (last == null || timestamp - last >= interval) {
	     rt.render();
		 last = timestamp;
	   }
	   requestAnimFrame(update);
	 })();
   }
 </script>
 <div id="screen"></div>
</body>
</html>
