<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A browser-based software raytracer with geometric primitives."
    />
    <meta name="theme-color" content="#111111" />
    <meta name="color-scheme" content="dark" />
    <meta property="og:title" content="Raytracer" />
    <meta
      property="og:description"
      content="Software raytracer with sphere, cube, cone, cylinder, and a colored ground plane."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://alexanderjbuck.github.io/raytracer/" />
    <meta property="og:image" content="https://alexanderjbuck.github.io/raytracer/preview.svg" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Raytracer</title>
    <style>
      html {
        background: #111111;
        color-scheme: dark;
      }

      html:not(.app-ready) body {
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="page__header">
        <h1 class="page__title">Raytracer</h1>
        <p class="page__subtitle">Software raytracer</p>
      </header>

      <button id="btn-help" class="help-button" type="button" aria-label="Help" title="Help">?</button>

      <section id="game-panel" class="game-panel">
        <div class="game-screen">
          <div id="screen" class="game-screen__viewport" aria-label="Render view"></div>
          <div id="screen-overlay" class="screen-overlay">
            <button
              id="btn-play-overlay"
              class="screen-overlay__play"
              type="button"
              aria-label="Play"
              title="Play"
            >
              &#9654;
            </button>
          </div>
        </div>

        <div class="render-controls" aria-label="Render controls">
          <div class="render-controls__group">
            <button
              id="btn-resolution-down"
              class="control-button"
              type="button"
              aria-label="Decrease resolution"
              title="Decrease resolution"
            >
              &minus;
            </button>
            <span id="resolution-label" class="control-label" aria-live="polite">50%</span>
            <button
              id="btn-resolution-up"
              class="control-button"
              type="button"
              aria-label="Increase resolution"
              title="Increase resolution"
            >
              +
            </button>
          </div>
          <button
            id="btn-play"
            class="control-button control-button--primary"
            type="button"
            aria-label="Play"
            title="Play"
          >
            Play
          </button>
        </div>
      </section>

      <footer class="page__footer">
        <a
          class="page__link"
          href="https://github.com/alexanderjbuck/raytracer"
          target="_blank"
          rel="noopener noreferrer"
        >
          Source on GitHub
        </a>
      </footer>
    </main>

    <dialog id="help-modal" class="modal" aria-labelledby="help-title">
      <div class="modal__panel">
        <h2 id="help-title" class="modal__title"></h2>
        <ul id="help-list" class="modal__list"></ul>
        <button id="help-close" class="modal__close" type="button">Close</button>
      </div>
    </dialog>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
