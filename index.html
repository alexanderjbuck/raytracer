<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A browser-based raytracer dungeon explorer. Find the key and escape the maze."
    />
    <meta name="theme-color" content="#111111" />
    <meta name="color-scheme" content="dark" />
    <meta property="og:title" content="Raytracer" />
    <meta
      property="og:description"
      content="Explore a randomly generated dungeon, collect the key, and escape."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://alexanderjbuck.github.io/raytracer/" />
    <meta property="og:image" content="https://alexanderjbuck.github.io/raytracer/preview.svg" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Raytracer</title>
    <style>
      html {
        background: #111111;
        color-scheme: dark;
      }

      html:not(.app-ready) body {
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="page__header">
        <h1 class="page__title">Raytracer</h1>
        <p class="page__subtitle">Seeded dungeon explorer</p>
      </header>

      <button id="btn-help" class="help-button" type="button" aria-label="Help" title="Help">?</button>

      <section id="game-panel" class="game-panel">
        <div id="status-bar" class="status-bar" hidden></div>
        <div class="game-screen">
          <div id="screen" class="game-screen__viewport" aria-label="Game view"></div>
          <div id="screen-overlay" class="screen-overlay">
            <p id="overlay-message" class="screen-overlay__message" hidden></p>
            <button
              id="btn-play"
              class="screen-overlay__play"
              type="button"
              aria-label="Play"
              title="Play"
            >
              &#9654;
            </button>
          </div>
        </div>
        <p class="controls-hint">WASD / arrows to move. Tap the view to look around.</p>
      </section>

      <footer class="page__footer">
        <a
          class="page__link"
          href="https://github.com/alexanderjbuck/raytracer"
          target="_blank"
          rel="noopener noreferrer"
        >
          Source on GitHub
        </a>
      </footer>
    </main>

    <dialog id="help-modal" class="modal" aria-labelledby="help-title">
      <div class="modal__panel">
        <h2 id="help-title" class="modal__title"></h2>
        <ul id="help-list" class="modal__list"></ul>
        <button id="help-close" class="modal__close" type="button">Close</button>
      </div>
    </dialog>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
